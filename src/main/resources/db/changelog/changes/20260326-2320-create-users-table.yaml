databaseChangeLog:
#  - include:
#      file: db/changelog/base-columns.yaml
#  - include:
#      file: db/changelog/audit-columns.yaml
  - changeSet:
      id: create-user-table
      author: abrorxon
      changes:
        - createTable:
            tableName: users
            columns:
#              - includeColumns:
#                  file: db/changelog/base-columns.yaml
#              - includeColumns:
#                  file: db/changelog/audit-columns.yaml

              # BaseEntity
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: users_pkey
                  name: id
                  type: VARCHAR(27)
              - column:
                  name: version
                  type: BIGINT
                  # AuditEntity
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: updated_by
                  type: VARCHAR(255)
                  # User
              - column:
                  name: client_code
                  constraints:
                    unique: true
                    uniqueConstraintName: uk_users_client_code
                  type: VARCHAR(255)
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    uniqueConstraintName: uk_users_email
              - column:
                  name: location_id
                  type: VARCHAR(255)
              - column:
                  name: password
                  type: VARCHAR(255)
              - column:
                  name: phone
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    uniqueConstraintName: uk_users_phone
              - column:
                  defaultValueBoolean: false
                  name: reset_password_allowed
                  type: BOOLEAN
              - column:
                  constraints:
                    nullable: false
                  name: telegram_id
                  type: INTEGER
              - column:
                  name: user_name
                  constraints:
                    unique: true
                    uniqueConstraintName: uk_users_user_name
                  type: VARCHAR(255)
              - column:
                  name: user_type
                  type: VARCHAR(255)

