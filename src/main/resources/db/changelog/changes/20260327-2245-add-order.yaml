databaseChangeLog:
#  - include:
#      file: db/changelog/base-columns.yaml
#  - include:
#      file: db/changelog/audit-columns.yaml
  - changeSet:
      id: 20260327-2245-add-order
      author: islom
      changes:
        - createTable:
            tableName: orders
            columns:
              # Base
              - column:
                  name: id
                  type: VARCHAR(27)
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: version
                  type: BIGINT
              # Audit
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: client_id
                  type: VARCHAR(27)
              - column:
                  name: status
                  type: VARCHAR(255)
