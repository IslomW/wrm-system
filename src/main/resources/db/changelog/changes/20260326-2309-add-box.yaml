databaseChangeLog:
#  - include:
#      file: db/changelog/base-columns.yaml
#  - include:
#      file: db/changelog/audit-columns.yaml
  - changeSet:
      id: 20260326-2309-create-box
      author: islom
      changes:
        - createTable:
            tableName: box
            columns:
              # Base
              - column:
                  name: id
                  type: VARCHAR(27)
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: version
                  type: BIGINT
              # Audit
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: updated_by
                  type: VARCHAR(255)

              - column:
                  name: box_number
                  type: VARCHAR(255)
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: qr_code
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: box_group_id
                  type: VARCHAR(27)
              - column:
                  name: current_warehouse_id
                  type: VARCHAR(255)
              - column:
                  name: qr_status
                  type: VARCHAR(255)

        # FK -> box_group
        - addForeignKeyConstraint:
            baseTableName: box
            baseColumnNames: box_group_id
            constraintName: fk_box_box_group
            referencedTableName: box_group
            referencedColumnNames: id

        # FK -> warehouse
        - addForeignKeyConstraint:
            baseTableName: box
            baseColumnNames: current_warehouse_id
            constraintName: fk_box_warehouse
            referencedTableName: warehouses
            referencedColumnNames: id